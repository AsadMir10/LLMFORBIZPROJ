<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload PDF — Enterprise RAG</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --accent: #6c63ff;
            --accent-hover: #7f78ff;
            --text: #e4e4e7;
            --text-muted: #9ca3af;
            --success: #22c55e;
            --error: #ef4444;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: .25rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: .875rem;
            margin-bottom: 2rem;
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 2rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: var(--accent);
            background: rgba(108, 99, 255, .06);
        }

        .upload-zone svg {
            width: 40px;
            height: 40px;
            margin-bottom: .75rem;
            color: var(--accent);
        }

        .upload-zone p {
            color: var(--text-muted);
            font-size: .875rem;
        }
        .upload-zone .filename {
            color: var(--accent);
            font-weight: 500;
            margin-top: .5rem;
            font-size: .9rem;
        }

        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        button[type="submit"] {
            width: 100%;
            padding: .85rem;
            border: none;
            border-radius: var(--radius);
            background: var(--accent);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s, transform .1s;
        }
        button[type="submit"]:hover {
            background: var(--accent-hover);
        }
        button[type="submit"]:active {
            transform: scale(.98);
        }

        .result {
            margin-top: 1.5rem;
            padding: 1.25rem;
            border-radius: var(--radius);
            font-size: .875rem;
            line-height: 1.6;
        }
        .result.success {
            background: rgba(34, 197, 94, .1);
            border: 1px solid rgba(34, 197, 94, .3);
        }
        .result.success h3 {
            color: var(--success);
            font-size: .95rem;
            margin-bottom: .5rem;
        }
        .result .detail {
            color: var(--text-muted);
        }
        .result .detail span {
            color: var(--text);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📄 Upload PDF</h1>
        <p class="subtitle">Ingest a document into the Knowledge Base</p>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <label class="upload-zone" id="dropZone">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775
                             5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1
                             18 19.5H6.75Z" />
                </svg>
                <p>Drag &amp; drop a <strong>.pdf</strong> file here, or click to browse</p>
                <p class="filename" id="fileName"></p>
                <input type="file" name="pdf_file" accept=".pdf" id="fileInput">
            </label>

            <button type="submit">Upload &amp; Ingest</button>
        </form>

        {% if success %}
        <div class="result success">
            <h3>✅ Ingestion complete</h3>
            <p class="detail">
                File: <span>{{ result.filename }}</span><br>
                Pages extracted: <span>{{ result.pages }}</span><br>
                Semantic chunks: <span>{{ result.chunks }}</span><br>
                Vectors upserted: <span>{{ result.vectors }}</span>
            </p>
        </div>
        {% endif %}
    </div>

    <script>
        const zone = document.getElementById('dropZone');
        const input = document.getElementById('fileInput');
        const nameEl = document.getElementById('fileName');

        input.addEventListener('change', () => {
            nameEl.textContent = input.files[0]?.name || '';
        });

        ['dragenter', 'dragover'].forEach(evt =>
            zone.addEventListener(evt, e => { e.preventDefault(); zone.classList.add('dragover'); })
        );
        ['dragleave', 'drop'].forEach(evt =>
            zone.addEventListener(evt, e => { e.preventDefault(); zone.classList.remove('dragover'); })
        );
    </script>
</body>
</html>
